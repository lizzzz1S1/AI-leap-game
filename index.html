<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI大跃进生存模拟器</title>
<style>
/* ===== Reset & Base ===== */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { 
  width:100%; height:100%; 
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #0a0a0f; color: #e0e0e0; overflow: hidden;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* ===== Screen Container ===== */
#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ===== Top Bar (stats) ===== */
.top-bar {
  flex-shrink: 0;
  padding: 8px 16px;
  background: rgba(15,15,25,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 10;
}
.quarter-label {
  font-size: 13px; color: #888; margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.quarter-label .year { color: #6ee7b7; font-weight: 600; }
.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 4px 12px;
}
.stat-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; line-height: 20px;
}
.stat-icon { font-size: 14px; flex-shrink: 0; }
.stat-bar-bg {
  flex: 1; height: 6px; background: rgba(255,255,255,0.08);
  border-radius: 3px; overflow: hidden; min-width: 40px;
}
.stat-bar {
  height: 100%; border-radius: 3px;
  transition: width 0.6s ease, background 0.3s;
}
.stat-val { font-size: 11px; color: #999; min-width: 22px; text-align: right; }

/* ===== Main Content Area ===== */
.main-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
}

/* ===== Cards ===== */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 16px;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-title {
  font-size: 15px; font-weight: 600; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.card-body { font-size: 14px; line-height: 1.7; color: #bbb; }
.card-body p { margin-bottom: 6px; }

/* ===== Narration Card ===== */
.narration-card {
  background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(168,85,247,0.08));
  border-color: rgba(139,92,246,0.2);
}
.narration-card .card-title { color: #a78bfa; }

/* ===== Event Card ===== */
.event-card {
  border-color: rgba(251,191,36,0.25);
  background: linear-gradient(135deg, rgba(251,191,36,0.08), rgba(245,158,11,0.04));
}
.event-card .card-title { color: #fbbf24; }
.event-card.major {
  border-color: rgba(239,68,68,0.3);
  background: linear-gradient(135deg, rgba(239,68,68,0.12), rgba(220,38,38,0.06));
  animation: pulseBorder 2s ease infinite;
}
.event-card.major .card-title { color: #f87171; }
@keyframes pulseBorder {
  0%,100% { border-color: rgba(239,68,68,0.3); }
  50% { border-color: rgba(239,68,68,0.6); }
}

/* ===== Result Card ===== */
.result-card {
  border-color: rgba(34,197,94,0.2);
  background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(22,163,74,0.04));
}
.result-card .card-title { color: #4ade80; }

/* ===== Ending Card ===== */
.ending-card {
  background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1));
  border-color: rgba(139,92,246,0.3);
  text-align: center; padding: 24px 16px;
}
.ending-card .ending-title {
  font-size: 22px; font-weight: 700; color: #c4b5fd;
  margin-bottom: 12px;
}
.ending-card .ending-text {
  font-size: 14px; line-height: 1.8; color: #d1d5db;
  margin-bottom: 16px; text-align: left;
}
.ending-card .ending-tags {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-bottom: 16px;
}
.ending-tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px;
  background: rgba(139,92,246,0.2); color: #c4b5fd;
  border: 1px solid rgba(139,92,246,0.3);
}

/* ===== Buttons ===== */
.btn-group {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 8px;
}
.btn {
  display: block; width: 100%;
  padding: 12px 16px; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; background: rgba(255,255,255,0.04);
  color: #e0e0e0; font-size: 14px; line-height: 1.5;
  text-align: left; cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
.btn .btn-label { font-weight: 600; margin-bottom: 2px; }
.btn .btn-desc { font-size: 12px; color: #999; }

.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-color: rgba(139,92,246,0.4);
  text-align: center; font-weight: 600;
}
.btn-primary:active { opacity: 0.85; }

.btn-selected {
  background: rgba(99,102,241,0.15);
  border-color: rgba(99,102,241,0.4);
}
.btn-selected .btn-label { color: #a78bfa; }

.btn-disabled {
  opacity: 0.4; pointer-events: none;
}

/* ===== Action Select ===== */
.action-counter {
  font-size: 13px; color: #888; margin-bottom: 8px;
}
.action-counter span { color: #6ee7b7; font-weight: 600; }

/* ===== Start Screen ===== */
.start-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; padding: 24px;
  text-align: center;
}
.start-screen h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #6ee7b7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.start-screen .subtitle {
  font-size: 14px; color: #888; line-height: 1.7; margin-bottom: 32px;
  max-width: 320px;
}
.start-screen .start-btn {
  padding: 14px 48px; border-radius: 24px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none; color: white; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: transform 0.2s;
}
.start-screen .start-btn:active { transform: scale(0.95); }

/* ===== Stat Change Popup ===== */
.stat-change {
  position: fixed; 
  font-size: 13px; font-weight: 600;
  pointer-events: none; z-index: 100;
  animation: floatUp 1.2s ease forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.stat-change.positive { color: #4ade80; }
.stat-change.negative { color: #f87171; }

/* ===== Progress Bar ===== */
.progress-bar {
  height: 3px; background: rgba(255,255,255,0.06);
  margin-top: 4px;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6);
  transition: width 0.4s ease;
}

/* ===== Typewriter ===== */
.typewriter { overflow: hidden; }

/* ===== Share button ===== */
.share-btn {
  margin-top: 8px; padding: 10px 32px;
  border-radius: 20px; border: 1px solid rgba(139,92,246,0.3);
  background: rgba(139,92,246,0.15);
  color: #c4b5fd; font-size: 14px; cursor: pointer;
}

/* ===== Landscape warning (optional) ===== */
@media (min-width: 600px) {
  #app { max-width: 430px; margin: 0 auto; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); }
}
</style>
</head>
<body>
<div id="app"></div>
<script src="game.js"></script>
</body>
</html>
