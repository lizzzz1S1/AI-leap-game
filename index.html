
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI大跃进生存模拟器</title>
<style>
/* ===== Reset & Base ===== */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { 
  width:100%; height:100%; 
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: #ffffff; color: #1a1a2e; overflow: hidden;
  font-size: 15px;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ===== Top Bar ===== */
.top-bar {
  flex-shrink: 0;
  padding: 10px 16px 8px;
  background: #fff;
  border-bottom: 1px solid #f0f0f0;
  z-index: 10;
}
.user-info-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; padding-bottom: 8px;
  border-bottom: 1px solid #f0f0f0;
}
.user-avatar { font-size: 28px; }
.user-details { flex: 1; }
.user-name { font-size: 15px; font-weight: 600; color: #1a1a2e; }
.user-bio { font-size: 12px; color: #999; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.quarter-badge {
  padding: 4px 10px; border-radius: 16px;
  background: #4f46e5; color: white;
  font-size: 12px; font-weight: 600; white-space: nowrap;
}

.stats-list {
  display: flex; flex-direction: column; gap: 6px;
}
.stat-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; line-height: 20px;
}
.stat-icon { font-size: 15px; flex-shrink: 0; }
.stat-label { min-width: 42px; color: #555; font-size: 13px; }
.stat-info-btn {
  width: 16px; height: 16px; border-radius: 50%;
  background: #e8e8ec; color: #999; font-size: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; border: none;
  font-style: italic; font-weight: 600; font-family: serif;
  position: relative;
}
.stat-bar-bg {
  flex: 1; height: 8px; background: #f0f0f3;
  border-radius: 4px; overflow: hidden; min-width: 60px;
}
.stat-bar {
  height: 100%; border-radius: 4px;
  transition: width 0.6s ease, background 0.3s;
}
.stat-val { font-size: 12px; color: #888; min-width: 26px; text-align: right; font-weight: 600; }

/* ===== Tooltip ===== */
.tooltip-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  z-index: 999; background: rgba(0,0,0,0.15);
}
.tooltip-box {
  position: fixed; left: 50%; transform: translateX(-50%);
  top: 40%; background: white; border-radius: 12px;
  padding: 16px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  z-index: 1000; max-width: 280px; width: 80%;
  font-size: 14px; color: #333; line-height: 1.6;
  text-align: center;
}
.tooltip-box .close-tip {
  margin-top: 10px; padding: 6px 20px; border-radius: 16px;
  background: #4f46e5; color: white; border: none;
  font-size: 13px; cursor: pointer;
}

/* ===== Main Content Area ===== */
.main-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
}

/* ===== Cards ===== */
.card {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 14px; padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  animation: fadeUp 0.35s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-title {
  font-size: 16px; font-weight: 600; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
  color: #1a1a2e;
}
.card-body { font-size: 15px; line-height: 1.7; color: #555; }
.card-body p { margin-bottom: 6px; }

/* ===== Narration Card ===== */
.narration-card {
  background: linear-gradient(135deg, #f5f3ff, #ede9fe);
  border-color: #ddd6fe;
}
.narration-card .card-title { color: #6d28d9; }

/* ===== Event Card ===== */
.event-card {
  border-color: #fde68a;
  background: linear-gradient(135deg, #fffbeb, #fef3c7);
}
.event-card .card-title { color: #b45309; }
.event-card.major {
  border-color: #fca5a5;
  background: linear-gradient(135deg, #fef2f2, #fee2e2);
  animation: pulseBorder 2s ease infinite;
}
.event-card.major .card-title { color: #dc2626; }
@keyframes pulseBorder {
  0%,100% { border-color: #fca5a5; }
  50% { border-color: #f87171; }
}

/* ===== Result Card ===== */
.result-card {
  border-color: #bbf7d0;
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
}
.result-card .card-title { color: #16a34a; }

/* ===== Ending Card ===== */
.ending-card {
  background: linear-gradient(135deg, #f5f3ff, #ede9fe);
  border-color: #c4b5fd;
  text-align: center; padding: 24px 16px;
}
.ending-card .ending-title {
  font-size: 24px; font-weight: 700; color: #6d28d9;
  margin-bottom: 12px;
}
.ending-card .ending-text {
  font-size: 15px; line-height: 1.8; color: #444;
  margin-bottom: 16px; text-align: left;
}
.ending-card .ending-tags {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-bottom: 16px;
}
.ending-tag {
  padding: 4px 12px; border-radius: 20px; font-size: 12px;
  background: #ede9fe; color: #7c3aed;
  border: 1px solid #ddd6fe;
}

/* ===== Buttons ===== */
.btn-group {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 4px;
}
/* 双列布局 */
.btn-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 4px;
}
.btn {
  display: block; width: 100%;
  padding: 12px 14px; border: 1px solid #e5e5ea;
  border-radius: 12px; background: #fafafa;
  color: #1a1a2e; font-size: 14px; line-height: 1.5;
  text-align: left; cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { background: #f0f0f5; transform: scale(0.98); }
.btn .btn-label { font-weight: 600; margin-bottom: 2px; font-size: 14px; }
.btn .btn-desc { font-size: 11px; color: #999; }
.btn .btn-fx { font-size: 11px; color: #888; margin-top: 3px; }

.btn-primary {
  background: #4f46e5;
  border-color: #4338ca;
  color: white; text-align: center; font-weight: 600; font-size: 16px;
}
.btn-primary:active { opacity: 0.85; }

.btn-selected {
  background: #ede9fe;
  border-color: #a78bfa;
}
.btn-selected .btn-label { color: #6d28d9; }

.btn-disabled {
  opacity: 0.35; pointer-events: none;
}

.btn-secondary {
  background: transparent; border: 1px solid #ddd;
  color: #888; text-align: center; font-size: 14px;
}

/* ===== Action Counter ===== */
.action-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.action-counter {
  font-size: 14px; color: #888;
}
.action-counter span { color: #4f46e5; font-weight: 600; }

/* ===== Start Screen ===== */
.start-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; height: 100%; padding: 24px;
  padding-top: 15vh;
  text-align: center;
}
.start-screen h1 {
  font-size: 34px; font-weight: 800;
  background: linear-gradient(135deg, #6d28d9, #059669);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 14px; line-height: 1.3;
}
.start-screen .subtitle {
  font-size: 15px; color: #888; line-height: 1.8; margin-bottom: 32px;
  max-width: 320px;
}
.start-screen .start-btn {
  padding: 14px 52px; border-radius: 26px;
  background: #4f46e5;
  border: none; color: white; font-size: 17px; font-weight: 600;
  cursor: pointer; transition: transform 0.2s;
}
.start-screen .start-btn:active { transform: scale(0.95); }
.ship-art {
  margin-top: 36px; font-size: 13px; line-height: 1.35;
  color: #bbb; white-space: pre; font-family: 'Courier New', monospace;
  letter-spacing: 1px;
}

/* ===== Profile Setup ===== */
.profile-screen {
  display: flex; flex-direction: column;
  height: 100%; padding: 24px; padding-top: 10vh;
}
.profile-screen h2 {
  font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px;
  text-align: center;
}
.gender-select {
  display: flex; gap: 16px; justify-content: center; margin-bottom: 24px;
}
.gender-btn {
  width: 80px; height: 80px; border-radius: 50%;
  border: 2px solid #e5e5ea; background: #fafafa;
  font-size: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.gender-btn.selected {
  border-color: #4f46e5; background: #ede9fe;
  box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
}
.gender-btn:active { transform: scale(0.95); }
.profile-field {
  margin-bottom: 16px;
}
.profile-field label {
  display: block; font-size: 14px; color: #888; margin-bottom: 6px;
}
.profile-field input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1px solid #e5e5ea; background: #fafafa;
  font-size: 15px; color: #1a1a2e; outline: none;
  transition: border-color 0.2s;
}
.profile-field input:focus { border-color: #4f46e5; }
.profile-field input::placeholder { color: #ccc; }

/* ===== Progress Bar ===== */
.progress-bar {
  height: 3px; background: #f0f0f3;
  margin-top: 6px; border-radius: 2px;
}
.progress-fill {
  height: 100%; background: #4f46e5;
  transition: width 0.4s ease; border-radius: 2px;
}

/* ===== Share button ===== */
.share-btn {
  margin-top: 8px; padding: 10px 32px;
  border-radius: 20px; border: 1px solid #ddd6fe;
  background: #f5f3ff;
  color: #7c3aed; font-size: 14px; cursor: pointer;
}

/* ===== Landscape ===== */
@media (min-width: 600px) {
  #app { max-width: 430px; margin: 0 auto; border-left: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; }
}
</style>
</head>
<body>
<div id="app"></div>
<script src="game.js"></script>
</body>
</html>
